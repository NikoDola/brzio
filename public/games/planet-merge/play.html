<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Merge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <script>
      // Dev panel is hidden by default. Reveal it when the URL includes ?dev=1
      // (set by the parent page when an authenticated admin is viewing).
      if (new URLSearchParams(location.search).get('dev') === '1') {
        document.documentElement.classList.add('dev-mode');
      }
      // Block wheel events from bubbling out and scrolling the parent page.
      window.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
    </script>
</head>
<body>
    <div id="game-container">
        <div id="game-stage">
            <div class="panel" id="score-panel">
                <div class="panel-label">SCORE</div>
                <div id="score">0</div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="game-canvas"></canvas>
                <button id="current-prev" class="current-arrow" type="button" aria-label="Previous planet">&lsaquo;</button>
                <button id="current-next" class="current-arrow" type="button" aria-label="Next planet">&rsaquo;</button>
                <div id="destroy-overlay" style="display:none">
                    <div id="destroy-text">Choose a planet you want to get destroyed</div>
                    <button id="destroy-skip" type="button">Continue</button>
                </div>
                <div id="game-over-overlay">
                    <h2>Game Over</h2>
                    <div class="final-line">Score: <span id="final-score">0</span></div>
                    <button id="restart-btn">Play Again</button>
                    <button id="change-difficulty-btn" type="button">Change Mode</button>
                </div>
            </div>
            <div class="panel" id="next-panel">
                <div class="panel-label" id="next-label">NEXT</div>
                <div class="next-row">
                    <canvas id="next-canvas" width="70" height="70"></canvas>
                </div>
            </div>
            <div id="difficulty-overlay" class="visible">
                <div class="difficulty-inner">
                    <h1 class="difficulty-title">Planet Merge</h1>
                    <p class="difficulty-sub">Choose your adventure!</p>
                    <div class="difficulty-buttons">
                        <button class="diff-btn diff-easy" type="button" data-diff="easy">
                            <img class="diff-icon" src="assets/images/planet_moon.svg" alt="">
                            <div class="diff-text">
                                <div class="diff-label">Easy</div>
                                <div class="diff-blurb">No tiny stars. Venus drops too!</div>
                            </div>
                        </button>
                        <button class="diff-btn diff-normal" type="button" data-diff="normal">
                            <img class="diff-icon" src="assets/images/planet_mars.svg" alt="">
                            <div class="diff-text">
                                <div class="diff-label">Normal</div>
                                <div class="diff-blurb">The classic planet mix</div>
                            </div>
                        </button>
                        <button class="diff-btn diff-hard" type="button" data-diff="hard">
                            <img class="diff-icon" src="assets/images/planet_sun.svg" alt="">
                            <div class="diff-text">
                                <div class="diff-label">Hard</div>
                                <div class="diff-blurb">No superpowers. Just skill!</div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
       
        <div id="dev-panel">
            <button id="dev-toggle">⚙ DEV</button>
            <div id="dev-body">
                <div class="dev-row">
                    <span class="dev-label">Auto-Drop</span>
                    <button id="auto-drop-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Speed</span>
                    <input id="auto-speed" type="range" min="1" max="10" value="1" step="1">
                    <span id="auto-speed-val">1×</span>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Drop X</span>
                    <input id="auto-x" type="range" min="0" max="100" value="50" step="1">
                    <span id="auto-x-val">center</span>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Drop</span>
                    <select id="drop-mode">
                        <option value="weighted">weighted (default)</option>
                        <option value="random">any random</option>
                    </select>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Colliders</span>
                    <button id="collider-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Choose Power</span>
                    <button id="force-choose-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Destroy Power</span>
                    <button id="force-destroy-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-stats">
                    <span>Drops <b id="stat-drops">0</b></span>
                    <span>Games <b id="stat-games">0</b></span>
                    <span>Avg score <b id="stat-avg">—</b></span>
                </div>
            </div>
        </div>
    </div>
    <button id="fullscreen-btn" class="fs-btn" type="button" aria-label="Toggle fullscreen">
        <svg class="fs-icon fs-icon-enter" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9V4h5"/>
            <path d="M20 9V4h-5"/>
            <path d="M4 15v5h5"/>
            <path d="M20 15v5h-5"/>
        </svg>
        <svg class="fs-icon fs-icon-exit" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 4v5H4"/>
            <path d="M15 4v5h5"/>
            <path d="M9 20v-5H4"/>
            <path d="M15 20v-5h5"/>
        </svg>
    </button>
    <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/build/decomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
