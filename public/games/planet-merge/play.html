<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Merge</title>
    <link rel="stylesheet" href="style.css">
    <script>
      // Dev panel is hidden by default. Reveal it when the URL includes ?dev=1
      // (set by the parent page when an authenticated admin is viewing).
      if (new URLSearchParams(location.search).get('dev') === '1') {
        document.documentElement.classList.add('dev-mode');
      }
      // Block wheel events from bubbling out and scrolling the parent page.
      window.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
    </script>
</head>
<body>
    <div id="game-container">
        <div id="game-stage">
            <div class="panel" id="score-panel">
                <div class="panel-label">SCORE</div>
                <div id="score">0</div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="game-canvas"></canvas>
                <div id="destroy-overlay" style="display:none">
                    <div id="destroy-text">Choose a planet you want to get destroyed</div>
                    <button id="destroy-skip" type="button">Continue</button>
                </div>
                <div id="game-over-overlay">
                    <h2>Game Over</h2>
                    <div class="final-line">Score: <span id="final-score">0</span></div>
                    <button id="restart-btn">Play Again</button>
                </div>
            </div>
            <div class="panel" id="next-panel">
                <div class="panel-label" id="next-label">NEXT</div>
                <div class="next-row">
                    <button id="next-prev" class="next-arrow" type="button" aria-label="Previous planet">&lsaquo;</button>
                    <canvas id="next-canvas" width="70" height="70"></canvas>
                    <button id="next-next" class="next-arrow" type="button" aria-label="Next planet">&rsaquo;</button>
                </div>
            </div>
        </div>
       
        <div id="dev-panel">
            <button id="dev-toggle">⚙ DEV</button>
            <div id="dev-body">
                <div class="dev-row">
                    <span class="dev-label">Auto-Drop</span>
                    <button id="auto-drop-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Speed</span>
                    <input id="auto-speed" type="range" min="1" max="10" value="1" step="1">
                    <span id="auto-speed-val">1×</span>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Drop X</span>
                    <input id="auto-x" type="range" min="0" max="100" value="50" step="1">
                    <span id="auto-x-val">center</span>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Drop</span>
                    <select id="drop-mode">
                        <option value="weighted">weighted (default)</option>
                        <option value="random">any random</option>
                    </select>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Colliders</span>
                    <button id="collider-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Choose Power</span>
                    <button id="force-choose-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-row">
                    <span class="dev-label">Destroy Power</span>
                    <button id="force-destroy-btn" class="dev-pill">OFF</button>
                </div>
                <div class="dev-stats">
                    <span>Drops <b id="stat-drops">0</b></span>
                    <span>Games <b id="stat-games">0</b></span>
                    <span>Avg score <b id="stat-avg">—</b></span>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/build/decomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
